- markdown: Parses a JSON string into a dictionary of property names and their string values.
- code: public static Dictionary<string, string> ParseJsonToDictionary(string json)
- h4: Parameters
- parameters:
  - name: json
    type:
    - text: string
      url: https://learn.microsoft.com/dotnet/api/system.string
    description: The JSON string to parse.
- h4: Returns
- parameters:
  - type:
    - text: Dictionary
      url: https://learn.microsoft.com/dotnet/api/system.collections.generic.dictionary-2
    - <
    - text: string
      url: https://learn.microsoft.com/dotnet/api/system.string
    - ','
    - " "
    - text: string
      url: https://learn.microsoft.com/dotnet/api/system.string
    - '>'
    description: A dictionary containing property names as keys and their string representations as values.
- h4: Examples
- markdown: >-
    <pre><code class="lang-csharp">string json = "{\"Name\":\"John\",\"Age\":\"30\"}";

    var props = JsonNativeAot.ParseJsonToDictionary(json);

    // props["Name"] = "John"

    // props["Age"] = "30"</code></pre>
- h4: Remarks
- markdown: >-
    This method provides low-level access to JSON parsing. It returns a raw dictionary

    of property names and values without deserializing to a specific type.

    Complex values (objects and arrays) are returned as raw JSON strings.

    Time Complexity: O(n) where n is the length of the JSON string.

    Space Complexity: O(n) for the output dictionary.
