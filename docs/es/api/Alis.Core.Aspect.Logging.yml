  - type:
      text: Logger
      url: Alis.Core.Aspect.Logging.Logger.html
    description: >-
      Static utility methods for backward compatibility with the legacy logging API.

      NOTE: For new code, use LoggerFactory and ILogger directly for better performance

      and flexibility. This class is provided for backward compatibility only.

      Uses a default global logger instance.
  - type:
      text: LoggerFactory
      url: Alis.Core.Aspect.Logging.LoggerFactory.html
    description: >-
      Factory for creating and configuring logger instances.

      Uses a fluent builder pattern for configuration.

      AOT-compatible: No reflection, no singleton pattern.

      Not thread-safe for configuration, but created loggers are thread-safe.
