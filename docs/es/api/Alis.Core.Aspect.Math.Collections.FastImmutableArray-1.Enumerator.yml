- h2: Remarks
- markdown: >-
    It is important that this enumerator does NOT implement <xref href="System.IDisposable" data-throw-if-not-resolved="false"></xref>.

    We want the iterator to inline when we do foreach and to not result in

    a try/finally frame in the client.
