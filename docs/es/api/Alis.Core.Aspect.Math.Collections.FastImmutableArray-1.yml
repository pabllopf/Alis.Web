- markdown: Creates an immutable array for this array, cast to a different element type.
- code: 'public FastImmutableArray<TOther> As<TOther>() where TOther : class'
- h4: Returns
- parameters:
  - type:
    - text: FastImmutableArray
      url: Alis.Core.Aspect.Math.Collections.FastImmutableArray-1.html
    - <
    - TOther
    - '>'
    description: >-
      A struct typed for the base element type. If the cast fails, an instance

      is returned whose <xref href="Alis.Core.Aspect.Math.Collections.FastImmutableArray%601.IsDefault" data-throw-if-not-resolved="false"></xref> property returns <code>true</code>.
- h4: Type Parameters
- parameters:
  - name: TOther
    description: The type of array element to return.
- h4: Remarks
- markdown: >-
    Arrays of derived elements types can be cast to arrays of base element types

    without reallocating the array.

    These upcasts can be reversed via this same method, casting an array of base

    element types to their derived types. However, down casting is only successful

    when it reverses a prior upcasting operation.
