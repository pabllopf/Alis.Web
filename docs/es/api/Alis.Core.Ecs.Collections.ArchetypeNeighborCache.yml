- h2: Remarks
- markdown: >-
    Stores both the ushort destination archetype ID (backward-compat) and the direct

    <xref href="Alis.Core.Ecs.Kernel.Archetypes.Archetype" data-throw-if-not-resolved="false"></xref> reference so the hot hit-path skips the WorldArchetypeTable lookup entirely.

    Round-robin (LRU-approx) eviction. Total size ~52 bytes (fits in one cache line).
