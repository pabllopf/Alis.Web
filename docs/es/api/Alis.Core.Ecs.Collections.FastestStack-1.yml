- markdown: >-
    Ensures that the capacity of this Stack is at least the specified <code class="paramref">capacity</code>.

    If the current capacity of the Stack is less than specified <code class="paramref">capacity</code>,

    the capacity is increased by continuously twice current capacity until it is at least the specified

    <code class="paramref">capacity</code>.
