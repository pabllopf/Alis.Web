- markdown: Frees the memory associated with this component handle and marks it for reuse.
- code: public void Dispose()
- h4: Remarks
- markdown: >-
    It is very easy to leak memory by improperly disposing of <xref href="Alis.Core.Ecs.Kernel.ComponentHandle" data-throw-if-not-resolved="false"></xref> instances. The handle

    does not check for double disposes.
