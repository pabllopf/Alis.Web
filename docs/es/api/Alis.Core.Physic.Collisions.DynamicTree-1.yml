  id: Alis_Core_Physic_Collisions_DynamicTree_1_RayCast_Alis_Core_Physic_Collisions_BroadPhaseRayCastCallback_Alis_Core_Physic_Collisions_RayCastInput__
  src: https://github.com/pabllopf/Alis/blob/master/4_Operation/Physic/src/Collisions/DynamicTree.cs#L355
  metadata:
    uid: Alis.Core.Physic.Collisions.DynamicTree`1.RayCast(Alis.Core.Physic.Collisions.BroadPhaseRayCastCallback,Alis.Core.Physic.Collisions.RayCastInput@)
    commentId: M:Alis.Core.Physic.Collisions.DynamicTree`1.RayCast(Alis.Core.Physic.Collisions.BroadPhaseRayCastCallback,Alis.Core.Physic.Collisions.RayCastInput@)
- markdown: >-
    Ray-cast against the proxies in the tree. This relies on the callback

    to perform a exact ray-cast in the case were the proxy contains a Shape.

    The callback also performs the any collision filtering. This has performance

    roughly equal to k * log(n), where k is the number of collisions and n is the

    number of proxies in the tree.
- code: public void RayCast(BroadPhaseRayCastCallback callback, ref RayCastInput input)
- h4: Parameters
- parameters:
  - name: callback
    type:
    - text: BroadPhaseRayCastCallback
      url: Alis.Core.Physic.Collisions.BroadPhaseRayCastCallback.html
    description: A callback class that is called for each proxy that is hit by the ray.
  - name: input
    type:
    - text: RayCastInput
      url: Alis.Core.Physic.Collisions.RayCastInput.html
    description: The ray-cast input data. The ray extends from p1 to p1 + maxFraction * (p2 - p1).
