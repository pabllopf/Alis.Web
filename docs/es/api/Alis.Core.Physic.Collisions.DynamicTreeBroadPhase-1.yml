    commentId: M:Alis.Core.Physic.Collisions.DynamicTreeBroadPhase`1.RayCast(Alis.Core.Physic.Collisions.BroadPhaseRayCastCallback,Alis.Core.Physic.Collisions.RayCastInput@)
- markdown: >-
    Ray-cast against the proxies in the tree. This relies on the callback

    to perform a exact ray-cast in the case were the proxy contains a shape.

    The callback also performs the any collision filtering. This has performance

    roughly equal to k * log(n), where k is the number of collisions and n is the

    number of proxies in the tree.
- code: public void RayCast(BroadPhaseRayCastCallback callback, ref RayCastInput input)
