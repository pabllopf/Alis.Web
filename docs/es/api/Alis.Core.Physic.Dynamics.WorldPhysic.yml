  id: Alis_Core_Physic_Dynamics_WorldPhysic_RayCast_Alis_Core_Physic_Dynamics_RayCastReportFixtureDelegate_Alis_Core_Aspect_Math_Vector_Vector2F_Alis_Core_Aspect_Math_Vector_Vector2F_
  src: https://github.com/pabllopf/Alis/blob/master/4_Operation/Physic/src/Dynamics/WorldPhysic.cs#L1380
  metadata:
    uid: Alis.Core.Physic.Dynamics.WorldPhysic.RayCast(Alis.Core.Physic.Dynamics.RayCastReportFixtureDelegate,Alis.Core.Aspect.Math.Vector.Vector2F,Alis.Core.Aspect.Math.Vector.Vector2F)
    commentId: M:Alis.Core.Physic.Dynamics.WorldPhysic.RayCast(Alis.Core.Physic.Dynamics.RayCastReportFixtureDelegate,Alis.Core.Aspect.Math.Vector.Vector2F,Alis.Core.Aspect.Math.Vector.Vector2F)
- markdown: >-
    Ray-cast the world for all fixtures in the path of the ray. Your callback

    controls whether you get the closest point, any point, or n-points.

    The ray-cast ignores shapes that contain the starting point.

    Inside the callback:

    return -1: ignore this fixture and continue

    return 0: terminate the ray cast

